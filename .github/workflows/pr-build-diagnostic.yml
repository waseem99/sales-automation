name: PR build diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.pull_request.number == 218
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run complete diagnostic
        id: diagnostic
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            echo '=== install pnpm ==='
            npm install --global pnpm@9.15.9
            echo '=== install dependencies ==='
            pnpm install --no-frozen-lockfile
            echo '=== build vercel contract ==='
            pnpm build:vercel
            echo '=== vercel typecheck ==='
            pnpm typecheck:vercel
          } 2>&1 | tee build-diagnostic.log
      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-218-build-diagnostic
          path: build-diagnostic.log
          if-no-files-found: error
          retention-days: 3
      - name: Fail when diagnostic failed
        if: steps.diagnostic.outcome != 'success'
        run: exit 1
