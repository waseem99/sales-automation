name: LinkedIn Sales Navigator CI

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/linkedin-sales-nav-ci.yml'
      - 'api/cron/linkedin-signals.ts'
      - 'vercel/linkedin-warm-signal-engine.ts'
      - 'packages/outreach-email/**'
      - 'packages/prospect-discovery/**'
      - 'packages/shared/**'
      - 'packages/storage/**'
      - 'packages/evaluator/**'
      - 'packages/fixtures/**'
      - 'scripts/windows/**'
      - 'docs/LOCAL_WINDOWS_CI.md'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'tsconfig*.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: linkedin-sales-nav-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, type-check and test
    runs-on: [self-hosted, Windows, X64, codistan-local]
    timeout-minutes: 45

    defaults:
      run:
        shell: powershell -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File "{0}"

    steps:
      - name: Prepare Windows runner
        run: |
          git config --global core.longpaths true
          Write-Host "Windows long-path support enabled for Git cleanup and checkout."

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve and verify local PostgreSQL
        env:
          SECRET_LOCAL_DATABASE_URL: ${{ secrets.LOCAL_DATABASE_URL }}
        run: |
          $databaseUrl = $env:SECRET_LOCAL_DATABASE_URL
          if ([string]::IsNullOrWhiteSpace($databaseUrl)) {
            $databaseUrl = [Environment]::GetEnvironmentVariable('LOCAL_DATABASE_URL', 'Machine')
          }
          if ([string]::IsNullOrWhiteSpace($databaseUrl)) {
            throw 'LOCAL_DATABASE_URL is missing. Run scripts/windows/setup-local-postgres-ci.ps1 as Administrator on the runner machine.'
          }
          Write-Host "::add-mask::$databaseUrl"
          $utf8 = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "DATABASE_URL=$databaseUrl`n", $utf8)

          $psqlCommand = Get-Command psql.exe -ErrorAction SilentlyContinue
          $psqlPath = if ($psqlCommand) { $psqlCommand.Source } else {
            Get-ChildItem 'C:\Program Files\PostgreSQL\*\bin\psql.exe' -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
          }
          if ([string]::IsNullOrWhiteSpace($psqlPath) -or -not (Test-Path $psqlPath)) {
            throw 'psql.exe was not found. Install PostgreSQL locally and rerun scripts/windows/setup-local-postgres-ci.ps1.'
          }
          & $psqlPath --dbname=$databaseUrl --set ON_ERROR_STOP=1 --command "SELECT current_database() AS database_name, current_user AS database_user;"
          if ($LASTEXITCODE -ne 0) {
            throw 'The self-hosted runner could not connect to the local PostgreSQL database.'
          }

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm.cmd --version

      - name: Install workspace dependencies
        run: pnpm.cmd install --no-frozen-lockfile

      - name: Build workspace packages
        run: pnpm.cmd build

      - name: Capture full Vercel type-check diagnostics
        continue-on-error: true
        run: |
          New-Item -Path typecheck-vercel.log -ItemType File -Force | Out-Null
          & cmd.exe /d /s /c "pnpm.cmd typecheck:vercel > typecheck-vercel.log 2>&1"
          $exitCode = $LASTEXITCODE
          if (Test-Path typecheck-vercel.log) { Get-Content typecheck-vercel.log | ForEach-Object { Write-Host $_ } }
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Upload full Vercel diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-vercel-typecheck-diagnostics
          path: typecheck-vercel.log
          if-no-files-found: warn
          retention-days: 7

      - name: Type-check LinkedIn and Sales Navigator runtime
        run: pnpm.cmd exec tsc -p tsconfig.linkedin-sales-nav.json --noEmit

      - name: Test unified signal mailbox
        run: pnpm.cmd --filter @sales-automation/outreach-email test

      - name: Test LinkedIn warm-signal qualification
        run: |
          & cmd.exe /d /s /c "pnpm.cmd --dir packages/prospect-discovery exec tsx src/linkedin-warm-signals.test.ts"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Test automatic Sales Navigator discovery
        run: |
          & cmd.exe /d /s /c "pnpm.cmd --dir packages/prospect-discovery exec tsx src/linkedin-sales-navigator-research.test.ts"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Capture full prospect-discovery package diagnostics
        continue-on-error: true
        run: |
          New-Item -Path prospect-discovery-full-tests.log -ItemType File -Force | Out-Null
          & cmd.exe /d /s /c "pnpm.cmd --filter @sales-automation/prospect-discovery test > prospect-discovery-full-tests.log 2>&1"
          $exitCode = $LASTEXITCODE
          if (Test-Path prospect-discovery-full-tests.log) { Get-Content prospect-discovery-full-tests.log | ForEach-Object { Write-Host $_ } }
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Upload full prospect-discovery diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prospect-discovery-full-tests
          path: prospect-discovery-full-tests.log
          if-no-files-found: warn
          retention-days: 7

      - name: Test Vercel runtime contracts
        run: |
          & cmd.exe /d /s /c "pnpm.cmd test:vercel-runtime"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Confirm focused LinkedIn release gate
        run: Write-Host 'Focused LinkedIn and Sales Navigator build, type-check and tests passed.'
