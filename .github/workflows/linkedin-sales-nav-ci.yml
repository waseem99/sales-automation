name: LinkedIn Sales Navigator CI

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/linkedin-sales-nav-ci.yml'
      - 'api/cron/linkedin-signals.ts'
      - 'vercel/linkedin-warm-signal-engine.ts'
      - 'packages/outreach-email/**'
      - 'packages/prospect-discovery/**'
      - 'packages/shared/**'
      - 'packages/storage/**'
      - 'packages/evaluator/**'
      - 'packages/fixtures/**'
      - 'scripts/windows/**'
      - 'docs/LOCAL_WINDOWS_CI.md'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'tsconfig*.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: linkedin-sales-nav-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, type-check and test
    runs-on: [self-hosted, Windows, X64, codistan-local]
    timeout-minutes: 45

    defaults:
      run:
        shell: powershell -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File "{0}"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve and verify local PostgreSQL
        env:
          SECRET_LOCAL_DATABASE_URL: ${{ secrets.LOCAL_DATABASE_URL }}
        run: |
          $databaseUrl = $env:SECRET_LOCAL_DATABASE_URL
          if ([string]::IsNullOrWhiteSpace($databaseUrl)) {
            $databaseUrl = [Environment]::GetEnvironmentVariable('LOCAL_DATABASE_URL', 'Machine')
          }
          if ([string]::IsNullOrWhiteSpace($databaseUrl)) {
            throw 'LOCAL_DATABASE_URL is missing. Run scripts/windows/setup-local-postgres-ci.ps1 as Administrator on the runner machine.'
          }

          Write-Host "::add-mask::$databaseUrl"
          $utf8 = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "DATABASE_URL=$databaseUrl`n", $utf8)

          $psqlCommand = Get-Command psql.exe -ErrorAction SilentlyContinue
          $psqlPath = if ($psqlCommand) { $psqlCommand.Source } else {
            Get-ChildItem 'C:\Program Files\PostgreSQL\*\bin\psql.exe' -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
          }
          if ([string]::IsNullOrWhiteSpace($psqlPath) -or -not (Test-Path $psqlPath)) {
            throw 'psql.exe was not found. Install PostgreSQL locally and rerun scripts/windows/setup-local-postgres-ci.ps1.'
          }

          & $psqlPath --dbname=$databaseUrl --set ON_ERROR_STOP=1 --command "SELECT current_database() AS database_name, current_user AS database_user;"
          if ($LASTEXITCODE -ne 0) {
            throw 'The self-hosted runner could not connect to the local PostgreSQL database.'
          }

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm --version

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build workspace packages
        run: pnpm build

      - name: Type-check Vercel runtime
        id: typecheck
        continue-on-error: true
        run: |
          pnpm typecheck:vercel 2>&1 | Tee-Object -FilePath typecheck-vercel.log
          $exitCode = $LASTEXITCODE
          "exit_code=$exitCode" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Upload type-check diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linkedin-sales-nav-typecheck
          path: typecheck-vercel.log
          if-no-files-found: error
          retention-days: 7

      - name: Test unified signal mailbox
        run: pnpm --filter @sales-automation/outreach-email test

      - name: Test Sales Navigator discovery and qualification
        run: pnpm --filter @sales-automation/prospect-discovery test

      - name: Test Vercel runtime contracts
        run: pnpm test:vercel-runtime

      - name: Enforce Vercel type-check result
        if: always() && steps.typecheck.outcome == 'failure'
        run: throw 'Vercel runtime type-check failed. See the linkedin-sales-nav-typecheck artifact for the complete compiler output.'
