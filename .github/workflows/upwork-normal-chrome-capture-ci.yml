name: Upwork Normal Chrome Capture CI

on:
  pull_request:
    branches:
      - agent/upwork-scheduled-chrome-worker-215
    paths:
      - '.github/workflows/upwork-normal-chrome-capture-ci.yml'
      - 'workers/acquisition/acquisition/upwork_extension_service.py'
      - 'workers/acquisition/browser-extension/**'
      - 'workers/acquisition/config/upwork-automation.toml'
      - 'workers/acquisition/scripts/windows/**'
      - 'workers/acquisition/tests/test_upwork_normal_chrome_capture.py'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: upwork-normal-chrome-capture-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Exact saved searches and safe capture
    runs-on: [self-hosted, Windows, X64, codistan-local]
    timeout-minutes: 20

    defaults:
      run:
        shell: powershell -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File "{0}"

    steps:
      - name: Prepare Windows runner
        run: git config --global core.longpaths true

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve installed acquisition Python
        run: |
          $command = Get-Command python.exe -ErrorAction SilentlyContinue
          $python = if ($command) { $command.Source } else {
            Get-ChildItem "$env:USERPROFILE\Codistan\*\workers\acquisition\.venv\Scripts\python.exe" -ErrorAction SilentlyContinue |
              Sort-Object FullName |
              Select-Object -First 1 -ExpandProperty FullName
          }
          if ([string]::IsNullOrWhiteSpace($python) -or -not (Test-Path $python)) {
            throw 'Python was not found. Run the normal-Chrome Upwork installer on this PC first.'
          }
          Write-Host "Using Python: $python"
          $utf8 = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "CODISTAN_ACQUISITION_PYTHON=$python`n", $utf8)

      - name: Install acquisition worker
        working-directory: workers/acquisition
        run: '& $env:CODISTAN_ACQUISITION_PYTHON -m pip install -e .'

      - name: Run exact-search and safe-boundary tests
        working-directory: workers/acquisition
        run: '& $env:CODISTAN_ACQUISITION_PYTHON -m unittest discover -s tests -p "test_upwork_normal_chrome_capture.py" -v'

      - name: Confirm capture boundary
        run: Write-Host 'Exact Upwork saved-search mapping, visible-card capture, report metadata, deduplication and no-navigation/no-stealth checks passed.'
