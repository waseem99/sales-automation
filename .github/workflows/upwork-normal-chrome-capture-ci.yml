name: Upwork Normal Chrome Capture CI

on:
  pull_request:
    branches:
      - agent/upwork-scheduled-chrome-worker-215
    paths:
      - '.github/workflows/upwork-normal-chrome-capture-ci.yml'
      - 'workers/acquisition/acquisition/upwork_extension_service.py'
      - 'workers/acquisition/browser-extension/**'
      - 'workers/acquisition/config/upwork-automation.toml'
      - 'workers/acquisition/scripts/windows/**'
      - 'workers/acquisition/tests/test_upwork_normal_chrome_capture.py'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: upwork-normal-chrome-capture-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Exact saved searches and safe capture
    runs-on: [self-hosted, Windows, X64, codistan-local]
    timeout-minutes: 20

    defaults:
      run:
        shell: powershell -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File "{0}"

    steps:
      - name: Prepare Windows runner
        run: git config --global core.longpaths true

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate exact mappings and one-click launcher
        run: |
          $root = (Resolve-Path '.').Path
          $extensionRoot = Join-Path $root 'workers\acquisition\browser-extension'
          $scriptsRoot = Join-Path $root 'workers\acquisition\scripts\windows'
          $servicePath = Join-Path $root 'workers\acquisition\acquisition\upwork_extension_service.py'
          $configPath = Join-Path $root 'workers\acquisition\config\upwork-automation.toml'
          $testPath = Join-Path $root 'workers\acquisition\tests\test_upwork_normal_chrome_capture.py'

          $manifest = Get-Content (Join-Path $extensionRoot 'manifest.json') -Raw | ConvertFrom-Json
          $background = Get-Content (Join-Path $extensionRoot 'background.js') -Raw
          $launcher = Get-Content (Join-Path $scriptsRoot 'open-approved-upwork-searches.ps1') -Raw
          $installer = Get-Content (Join-Path $scriptsRoot 'install-upwork-normal-chrome-capture-v2.ps1') -Raw
          $service = Get-Content $servicePath -Raw
          $config = Get-Content $configPath -Raw
          $tests = Get-Content $testPath -Raw

          if ($manifest.version -ne '0.5.0') { throw 'Extension 0.5.0 was not found.' }
          if ($manifest.background.service_worker -ne 'background.js') { throw 'The expected background service worker is missing.' }

          $searches = @(
            @{ Owner = 'Waseem'; Name = 'AI + Fullstack AI 16 July 2026'; Path = '/nx/find-work/9652811'; Url = 'https://www.upwork.com/nx/find-work/9652811' },
            @{ Owner = 'Roshana'; Name = '3D Design & Creatives 15 July 2026'; Path = '/nx/find-work/9652860'; Url = 'https://www.upwork.com/nx/find-work/9652860' },
            @{ Owner = 'Nadir'; Name = 'Game & AR/VR 16 July 2026'; Path = '/nx/find-work/9652877'; Url = 'https://www.upwork.com/nx/find-work/9652877' }
          )
          foreach ($search in $searches) {
            foreach ($source in @($background, $service, $tests)) {
              if (-not $source.Contains($search.Name)) { throw "Missing saved-search name: $($search.Name)" }
              if (-not $source.Contains($search.Owner)) { throw "Missing profile owner: $($search.Owner)" }
              if (-not $source.Contains($search.Path)) { throw "Missing saved-search path: $($search.Path)" }
            }
            $urlCount = [regex]::Matches($launcher, [regex]::Escape($search.Url)).Count
            if ($urlCount -ne 1) { throw "Launcher must contain exactly one $($search.Url) URL; found $urlCount." }
            if (-not $config.Contains($search.Url)) { throw "Configuration is missing $($search.Url)." }
          }

          if (-not $launcher.Contains('"--new-window"')) { throw 'The launcher does not open a dedicated normal Chrome window.' }
          if (-not $launcher.Contains('Codistan Upwork Capture Service')) { throw 'The launcher does not verify the local processor.' }
          if (-not $installer.Contains('Open Codistan Upwork Searches.lnk')) { throw 'The desktop shortcut is not installed.' }
          if (-not $installer.Contains('open-approved-upwork-searches.ps1')) { throw 'The launcher script is not copied by the installer.' }
          if (-not $service.Contains('upwork_saved_search_name')) { throw 'Saved-search identity is not persisted in opportunity evidence.' }
          if (-not $service.Contains('upwork_profile_owner')) { throw 'Profile-owner identity is not persisted in opportunity evidence.' }

          $prohibitedExtension = @(
            'chrome.tabs.create',
            'chrome.tabs.update',
            'navigator.webdriver',
            'mousemove',
            'dispatchEvent',
            'Math.random',
            'cloudflare',
            'captcha'
          )
          foreach ($marker in $prohibitedExtension) {
            if ($background.IndexOf($marker, [StringComparison]::OrdinalIgnoreCase) -ge 0) {
              throw "Prohibited extension behavior found: $marker"
            }
          }

          $prohibitedLauncher = @(
            'page.reload',
            'scrollIntoView',
            'mouse_event',
            'SendKeys',
            'navigator.webdriver',
            'Math.random',
            'cloudflare',
            'captcha'
          )
          foreach ($marker in $prohibitedLauncher) {
            if ($launcher.IndexOf($marker, [StringComparison]::OrdinalIgnoreCase) -ge 0) {
              throw "Prohibited launcher behavior found: $marker"
            }
          }

      - name: Confirm capture boundary
        run: Write-Host 'Exact saved-search mapping, one-click user-initiated launch, identity metadata and no-navigation/no-stealth boundary passed.'
