name: Repository CI (best effort)

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: repository-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Install standalone pnpm executable
        run: |
          npm install --global --prefix "$PWD/.pnpm-cli" --force @pnpm/exe@9.15.9
          echo "$PWD/.pnpm-cli/bin" >> "$GITHUB_PATH"

      - name: Show runtime versions
        run: |
          node --version
          npm --version
          pnpm --version

      - name: Run repository deployment check
        run: pnpm deploy:check
