name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - sprint-1-foundation

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          show-progress: false

      - name: Install standalone pnpm executable
        run: |
          npm install --global --prefix "$PWD/.pnpm-cli" --force @pnpm/exe@9.15.9
          echo "$PWD/.pnpm-cli/bin" >> "$GITHUB_PATH"

      - name: Show runtime versions
        run: |
          node --version
          npm --version
          command -v pnpm
          pnpm --version

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --silent

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: pnpm typecheck > typecheck.log 2>&1

      - name: Print typecheck log tail
        if: always()
        run: tail -n 160 typecheck.log || true

      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: typecheck-log
          path: typecheck.log

      - name: Fail if typecheck failed
        if: steps.typecheck.outcome != 'success'
        run: exit 1

      - name: Test
        id: test
        continue-on-error: true
        run: pnpm test > test.log 2>&1

      - name: Print test log tail
        if: always()
        run: tail -n 120 test.log || true

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-log
          path: test.log

      - name: Fail if tests failed
        if: steps.test.outcome != 'success'
        run: exit 1

      - name: Build
        run: pnpm build
