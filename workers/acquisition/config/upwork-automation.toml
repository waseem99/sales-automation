[pilot]
version = "2026-07-17.upwork-exact-saved-searches.v1"
max_jobs_total = 30
min_description_chars = 80

[automation]
version = "upwork-stability.v3"
navigation_wait_seconds = 10
challenge_wait_seconds = 900
challenge_poll_seconds = 15
max_runtime_minutes = 24
max_detail_enrichments = 0
detail_wait_seconds = 10
installed_browser_only = true
ingest_url_env = "ACQUISITION_INGEST_URL"
ingest_token_env = "ACQUISITION_INGEST_TOKEN"
request_timeout_seconds = 30
retention_days = 30

[schedule]
cadence_minutes = 30
start_offset_minutes = 7

[[schedule.windows]]
id = "us-east-through-pacific"
timezone = "America/New_York"
start_local = "07:00"
end_local = "21:30"
days = ["monday", "tuesday", "wednesday", "thursday", "friday", "saturday", "sunday"]

[[schedule.windows]]
id = "australia-early"
timezone = "Australia/Sydney"
start_local = "07:00"
end_local = "10:30"
days = ["monday", "tuesday", "wednesday", "thursday", "friday", "saturday", "sunday"]

