[pilot]
version = "2026-07-16.upwork-scheduled.v2"
max_jobs_total = 30
min_description_chars = 80

[automation]
version = "upwork-scheduled.v2"
navigation_wait_seconds = 10
challenge_wait_seconds = 900
challenge_poll_seconds = 15
max_runtime_minutes = 24
max_detail_enrichments = 6
detail_wait_seconds = 10
installed_browser_only = true
ingest_url_env = "ACQUISITION_INGEST_URL"
ingest_token_env = "ACQUISITION_INGEST_TOKEN"
request_timeout_seconds = 30
retention_days = 30

# Windows starts the scheduler at minute 07 and repeats every 30 minutes. The
# worker opens Chrome only while at least one DST-aware target-market window is
# active. This distributes workload away from the top of the hour; it is not
# random timing, human-input simulation or anti-detection behavior.
[schedule]
cadence_minutes = 30
start_offset_minutes = 7

# Covers the US working day from 07:00 Eastern through approximately 18:00
# Pacific. The 21:30 Eastern endpoint includes the 21:07 Eastern / 18:07 Pacific
# scheduler slot while keeping the fixed :07/:37 cadence.
[[schedule.windows]]
id = "us-east-through-pacific"
timezone = "America/New_York"
start_local = "07:00"
end_local = "21:30"
days = ["monday", "tuesday", "wednesday", "thursday", "friday", "saturday", "sunday"]

# Early Australian opportunity window, DST-aware for Sydney/Melbourne time.
[[schedule.windows]]
id = "australia-early"
timezone = "Australia/Sydney"
start_local = "07:00"
end_local = "10:30"
days = ["monday", "tuesday", "wednesday", "thursday", "friday", "saturday", "sunday"]

# Every active run visits all three exact saved-search links below. Commercial
# acceptance is enforced locally as: fixed price $1,000+, or hourly 30+
# hours/week for 3-6 months or more than 6 months. Explicit Pakistan and GCC
# client locations are archived. US jobs match both US-only and worldwide;
# other eligible countries match worldwide.

# Search query:
# (AI) OR (ML) OR (AI AND Agent) OR (Generative AND AI) OR (N8N) OR (RAG)
# OR (AI AND Web) OR (AI AND App) OR (Chatbot) OR (AI AND Builder)
# OR (Artificial AND Intelligence) OR (AI AND Development) OR (AI AND Bot)
# OR (OpenAI)
[[searches]]
id = "ai-jobs"
enabled = true
url = "https://www.upwork.com/nx/find-work/9652811"
max_jobs = 10
delay_seconds = 10

# Search query:
