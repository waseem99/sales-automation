services:
  - type: web
    name: codistan-prospect-desk
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: LOCAL_LEAD_STORE_PATH
        value: /data/leads.json
      - key: PROSPECT_RUN_STORE_PATH
        value: /data/prospect-runs.json
      - key: PROSPECT_WORKER_ENABLED
        value: "true"
      - key: PROSPECT_RUN_INTERVAL_HOURS
        value: "24"
      - key: PROSPECT_RUN_ON_START
        value: "true"
      - key: PROSPECT_MAX_CANDIDATES
        value: "50"
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: PROSPECT_DIGEST_TO
        sync: false
      - key: PROSPECT_DIGEST_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: PROSPECT_GREENHOUSE_BOARDS
        sync: false
      - key: PROSPECT_LEVER_SITES
        sync: false
      - key: PROSPECT_RSS_FEEDS
        sync: false
    disk:
      name: codistan-prospect-desk-data
      mountPath: /data
      sizeGB: 1
